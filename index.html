<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 AI 知识库</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --primary-text: #5d5c61;
            --secondary-text: #939196;
            --card-bg: #ffffff;
            --pastel-blue: #e3f2fd;
            --pastel-pink: #fce4ec;
            --pastel-green: #e8f5e9;
            --pastel-yellow: #fff9c4;
            --border-radius: 16px;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--primary-text); padding: 20px 40px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 2px dashed #eee; margin-bottom: 30px; }
        header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 10px; color: #7986cb; }
        
        .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        
        /* 栏目通用样式 */
        .column { background: var(--card-bg); border-radius: var(--border-radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid #f0f0f0; display: flex; flex-direction: column; height: 80vh; }
        .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .col-title { font-size: 1.2rem; font-weight: bold; }
        .list-container { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }
        
        /* 按钮样式 */
        .btn-add { background: var(--pastel-green); border: none; color: #388e3c; width: 32px; height: 32px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { transform: scale(1.1); filter: brightness(0.95); }
        .btn-copy { background: var(--pastel-blue); border: none; color: #1976d2; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; cursor: pointer; }
        
        /* 卡片具体样式 */
        .item-card { background: var(--bg-color); border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid transparent; position: relative; }
        
        /* 三列的主题色 */
        .col-products .item-card { border-left-color: #90caf9; }
        .col-prompts .item-card { border-left-color: #f48fb1; }
        .col-skills .item-card { border-left-color: #a5d6a7; }
        
        .item-title { font-weight: bold; margin-bottom: 5px; font-size: 1.05rem; }
        .item-desc { font-size: 0.9rem; color: var(--secondary-text); margin-bottom: 10px; line-height: 1.4; }
        .item-link { color: #5c6bc0; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .item-link:hover { text-decoration: underline; }
        
        /* 提示词特化 */
        .prompt-content { background: #f5f5f5; padding: 10px; border-radius: 8px; font-size: 0.85rem; color: #424242; white-space: pre-wrap; margin-top: 10px; display: none; border: 1px dashed #ccc; }
        .prompt-toggle { cursor: pointer; font-size: 0.85rem; color: #ab47bc; font-weight: bold; }

        /* 弹窗样式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .modal-content h2 { margin-bottom: 20px; color: #3f51b5; font-size: 1.3rem; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; color: var(--secondary-text); }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-family: inherit; }
        .form-group textarea { resize: vertical; height: 80px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-save { background: #7986cb; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .btn-cancel { background: #f5f5f5; color: var(--primary-text); border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }

        .delete-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #ef9a9a; cursor: pointer; font-size: 1.1rem; }
        .delete-btn:hover { color: #d32f2f; }
    </style>
</head>
<body>

    <header>
        <h1>🤖 AI Vault <span style="font-size: 1rem; color: var(--secondary-text); font-weight: normal;">| 私人效率抽屉</span></h1>
    </header>

    <div class="container">
        <div class="column col-products">
            <div class="col-header">
                <span class="col-title">🌍 AI 产品库</span>
                <button class="btn-add" onclick="openModal('product')">+</button>
            </div>
            <div class="list-container" id="productList"></div>
        </div>

        <div class="column col-prompts">
            <div class="col-header">
                <span class="col-title">💬 功能提示词</span>
                <button class="btn-add" onclick="openModal('prompt')">+</button>
            </div>
            <div class="list-container" id="promptList"></div>
        </div>

        <div class="column col-skills">
            <div class="col-header">
                <span class="col-title">📚 Skills & 笔记</span>
                <button class="btn-add" onclick="openModal('skill')">+</button>
            </div>
            <div class="list-container" id="skillList"></div>
        </div>
    </div>

    <div class="modal" id="inputModal">
        <div class="modal-content">
            <h2 id="modalTitle">添加新内容</h2>
            <input type="hidden" id="itemType">
            
            <div class="form-group">
                <label>标题 / 名称</label>
                <input type="text" id="inputTitle" placeholder="例如：Kimi Chat, 论文润色Prompt...">
            </div>
            <div class="form-group">
                <label>描述 / 提示词正文</label>
                <textarea id="inputDesc" placeholder="输入介绍或具体Prompt内容..."></textarea>
            </div>
            <div class="form-group" id="urlGroup">
                <label>网址 (可选)</label>
                <input type="url" id="inputUrl" placeholder="https://...">
            </div>
            
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-save" onclick="saveData()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 预设一些初始化数据，供首次打开时预览结构
        const defaultData = {
            products: [
                { id: 1, title: 'Gurobi 官网', desc: '求解器与数学规划文档', url: 'https://www.gurobi.com/' },
                { id: 2, title: 'OpenClaw (龙虾)', desc: '关注的智能体项目开源地址', url: '#' }
            ],
            prompts: [
                { id: 1, title: 'MATPOWER 代码调试', desc: '请帮我检查基于 IEEE 39 节点系统的 SOCP 松弛代码。注意成本系数存放在 mpc.gencost 字段中，而不是其它变量名。' },
                { id: 2, title: '综述论文大纲生成', desc: '我正在写《大模型在电力系统中的应用》的综述论文。请帮我生成大纲，必须包含大模型结合 RAG 技术在电力调度中的应用章节。' }
            ],
            skills: [
                { id: 1, title: '基于可达性分析的构网型逆变器动态降维与暂态稳定协同调度方法', desc: '【研究Idea】核心在"用什么方式解决什么问题" - 重点突破亚秒级动态降维与分钟级经济调度的耦合。', url: '#' },
                { id: 2, title: 'Convex Optimization (IPM)', desc: '内点法中 Hessian 矩阵与 Jacobian 矩阵的推导与 KKT 条件构造。', url: '' }
            ]
        };

        // 从 LocalStorage 加载数据，如果没有则使用默认数据
        let db = JSON.parse(localStorage.getItem('ai_vault_data'));
        if (!db) {
            db = defaultData;
            saveToLocal();
        }

        // 保存到本地存储
        function saveToLocal() {
            localStorage.setItem('ai_vault_data', JSON.stringify(db));
        }

        // 渲染产品列表
        function renderProducts() {
            const container = document.getElementById('productList');
            container.innerHTML = db.products.map(item => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('products', ${item.id})">×</button>
                    <div class="item-title">${item.title}</div>
                    <div class="item-desc">${item.desc}</div>
                    ${item.url ? `<a href="${item.url}" target="_blank" class="item-link">🔗 访问网站</a>` : ''}
                </div>
            `).join('');
        }

        // 渲染提示词列表
        function renderPrompts() {
            const container = document.getElementById('promptList');
            container.innerHTML = db.prompts.map(item => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('prompts', ${item.id})">×</button>
                    <div class="item-title" style="display:flex; justify-content:space-between;">
                        ${item.title}
                        <button class="btn-copy" onclick="copyText('${encodeURIComponent(item.desc)}')">复制</button>
                    </div>
                    <span class="prompt-toggle" onclick="togglePrompt('prompt-${item.id}')">👁️ 展开/折叠</span>
                    <div class="prompt-content" id="prompt-${item.id}">${item.desc}</div>
                </div>
            `).join('');
        }

        // 渲染技能列表
        function renderSkills() {
            const container = document.getElementById('skillList');
            container.innerHTML = db.skills.map(item => `
                <div class="item-card">
                    <button class="delete-btn" onclick="deleteItem('skills', ${item.id})">×</button>
                    <div class="item-title">${item.title}</div>
                    <div class="item-desc">${item.desc}</div>
                    ${item.url ? `<a href="${item.url}" target="_blank" class="item-link">📖 参考链接</a>` : ''}
                </div>
            `).join('');
        }

        // 初始化渲染
        function initRender() {
            renderProducts();
            renderPrompts();
            renderSkills();
        }

        // 弹窗逻辑
        function openModal(type) {
            document.getElementById('inputModal').style.display = 'flex';
            document.getElementById('itemType').value = type;
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputDesc').value = '';
            document.getElementById('inputUrl').value = '';
            
            const titles = { 'product': '添加 AI 产品', 'prompt': '添加提示词', 'skill': '添加 Skill / 笔记' };
            document.getElementById('modalTitle').innerText = titles[type];
            
            // 提示词不需要 URL 字段
            document.getElementById('urlGroup').style.display = type === 'prompt' ? 'none' : 'block';
        }

        function closeModal() {
            document.getElementById('inputModal').style.display = 'none';
        }

        // 保存新数据
        function saveData() {
            const type = document.getElementById('itemType').value;
            const title = document.getElementById('inputTitle').value;
            const desc = document.getElementById('inputDesc').value;
            const url = document.getElementById('inputUrl').value;

            if (!title) return alert('标题不能为空！');

            const newItem = { id: Date.now(), title, desc, url };

            if (type === 'product') db.products.unshift(newItem);
            if (type === 'prompt') db.prompts.unshift(newItem);
            if (type === 'skill') db.skills.unshift(newItem);

            saveToLocal();
            initRender();
            closeModal();
        }

        // 删除功能
        function deleteItem(category, id) {
            if(confirm('确定要删除这条记录吗？')) {
                db[category] = db[category].filter(item => item.id !== id);
                saveToLocal();
                initRender();
            }
        }

        // 展开/折叠提示词
        function togglePrompt(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        // 复制提示词内容
        function copyText(encodedText) {
            const text = decodeURIComponent(encodedText);
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板！');
            });
        }

        // 启动渲染
        initRender();
    </script>
</body>
</html>
